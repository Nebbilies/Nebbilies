name: Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - name: Metrics (left)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          template: classic
          filename: assets/metrics_left.svg
          config_octicon: yes
          config_timezone: Asia/Saigon
          base: header, activity, community, repositories
          config_order: base.header, base.repositories, base.activity+community, isocalendar

          plugin_achievements: no
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C
          plugin_followup: yes
          plugin_followup_archived: yes
          plugin_followup_indepth: yes
          plugin_followup_sections: repositories, user
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      - name: Metrics (right)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          template: classic
          filename: assets/metrics_right.svg
          config_octicon: yes
          config_timezone: Asia/Saigon
          base: ""
          config_order: languages, followup, habits, achievements, wakatime, fortune

          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_analysis_timeout_repositories: 7.5
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_details: bytes-size, percentage
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 30
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: C
          plugin_wakatime: yes
          plugin_wakatime_days: 30
          plugin_wakatime_limit: 5
          plugin_wakatime_repositories_visibility: public
          plugin_wakatime_sections: time, projects, projects-graphs, languages, languages-graphs, os
          plugin_wakatime_languages_other: no
          plugin_wakatime_languages_ignored: other
          plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }}
          plugin_wakatime_url: https://wakatime.com
          plugin_fortune: yes

      - name: Personal Metrics (left)
        uses: lowlighter/metrics@latest
        with:
          token: NOT_NEEDED
          template: classic
          filename: assets/personal_metrics_left.svg
          base: ""

          plugin_anilist: yes
          plugin_anilist_medias: anime, manga
          plugin_anilist_sections: favorites, watching, reading
          plugin_anilist_limit: 2
          plugin_anilist_shuffle: yes
          user: nebbilies

      - name: Personal Metrics (right)
        uses: lowlighter/metrics@latest
        with:
          token: NOT_NEEDED
          template: classic
          filename: assets/personal_metrics_right.svg
          base: ""
          config_order: music, steam
          config_timezone: Asia/Saigon

          plugin_music: yes
          plugin_music_provider: youtube
          plugin_music_limit: 5
          plugin_music_token: ${{ secrets.YOUTUBE_TOKEN }}
          plugin_music_mode: recent
          plugin_music_time_range: short
          plugin_music_top_type: tracks

          plugin_steam: yes
          plugin_steam_achievements_limit: 5
          plugin_steam_games_ignored: ""
          plugin_steam_games_limit: 1
          plugin_steam_playtime_threshold: 2
          plugin_steam_recent_games_limit: 2
          plugin_steam_sections: player, most-played, recently-played
          plugin_steam_token: ${{ secrets.STEAM_TOKEN }}
          plugin_steam_user: ${{ secrets.STEAM_ID }}
